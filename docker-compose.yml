services:
  backend:
    build: .
    container_name: ai-webui-backend
    env_file:
      - .env
    environment:
      # Defaults can be overridden via .env
      - LM_STUDIO_URL=${LM_STUDIO_URL:-http://10.0.0.198:11434/v1/chat/completions}
      - LM_STUDIO_MODEL=${LM_STUDIO_MODEL:-qwen3-vl-4b-thinking-1m}
      - LM_STUDIO_TIMEOUT=${LM_STUDIO_TIMEOUT:-120}
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request as r; r.urlopen('http://localhost:8000/').read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  ngrok:
    image: ngrok/ngrok:alpine
    container_name: ai-webui-ngrok
    env_file:
      - .env
    environment:
      NGROK_CONFIG: /app/ngrok.yml
    # Expose backend:8000 over ngrok; dashboard available on 4040
    command: "start --all --config /app/ngrok.yml --log=stdout"
    volumes:
      - ./ngrok.yml:/app/ngrok.yml:ro
      - ./ngrok-data:/var/lib/ngrok
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:4040:4040"
    restart: unless-stopped
